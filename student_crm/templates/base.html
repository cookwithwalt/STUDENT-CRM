<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student CRM{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7fb; }
        .navbar-brand { font-weight: 700; letter-spacing: .5px; }
        .card { border: none; border-radius: 16px; box-shadow: 0 8px 20px rgba(15,23,42,.07); }
        .table { background: white; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'dashboard' %}">StudentCRM</a>
        <div class="collapse navbar-collapse show">
            <ul class="navbar-nav ms-auto gap-2">
                <li class="nav-item"><a class="nav-link" href="{% url 'student_list' %}">Students</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'course_list' %}">Courses</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'enrollment_list' %}">Enrollments</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container pb-5">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
